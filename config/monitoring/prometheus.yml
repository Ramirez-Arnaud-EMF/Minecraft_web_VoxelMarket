global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: voxelmarket-backend1
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:3000

  - job_name: voxelmarket-backend2
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend2:3002

  - job_name: voxelmarket-backend3
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend3:3003

  - job_name: voxelmarket-mysql
    metrics_path: /metrics
    static_configs:
      - targets:
          - mysql-exporter:9104

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
